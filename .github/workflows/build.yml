name: Compilar StardewPhone

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar .NET
      - name: Instalar .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # 3. Limpar cache (MUITO IMPORTANTE)
      - name: Limpar cache NuGet
        run: dotnet nuget locals all --clear

      # 4. Restaurar dependências
      - name: Restaurar pacotes
        run: dotnet restore StardewPhone/StardewPhone.csproj

      # 5. Compilar
      - name: Compilar
        run: dotnet build StardewPhone/StardewPhone.csproj --configuration Release --no-restore

      # 6. Empacotar mod
      - name: Empacotar mod
        run: |
          mkdir -p output/StardewPhone
          cp StardewPhone/bin/Release/net6.0/StardewPhone.dll output/StardewPhone/
          cp StardewPhone/manifest.json output/StardewPhone/
          cp -r StardewPhone/assets output/StardewPhone/ 2>/dev/null || echo "Sem assets"

      # 7. Upload
      - name: Upload do mod
        uses: actions/upload-artifact@v4
        with:
          name: StardewPhone-mod
          path: output/StardewPhone/
          retention-days: 30
